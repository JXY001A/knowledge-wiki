<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>对话 — AI 自进化知识系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--sub:#64748b;--brand:#3b82f6;--brand-hover:#2563eb;--sidebar-w:260px}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:margin .25s}
.sidebar.collapsed{margin-left:calc(var(--sidebar-w) * -1)}
.sidebar-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.sidebar-header .brand{font-size:14px;font-weight:600;text-decoration:none;color:var(--text)}
.sidebar-header .brand:hover{color:var(--brand)}
.new-chat{width:calc(100% - 28px);margin:0 14px 12px;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px;justify-content:center;transition:all .15s}
.new-chat:hover{background:var(--border)}
.conv-list{flex:1;overflow-y:auto;padding:0 8px}
.conv-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;margin-bottom:2px;transition:background .1s}
.conv-item:hover{background:var(--bg)}
.conv-item.active{background:#eff6ff;color:var(--brand)}
.conv-item .title{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item .preview{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv-item .time{font-size:10px;color:#94a3b8;margin-top:2px}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar .left{display:flex;align-items:center;gap:12px}
.topbar .menu-btn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--sub);padding:4px;border-radius:6px}
.topbar .menu-btn:hover{background:var(--bg)}
.avatar-menu{position:relative}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;transition:box-shadow .2s}
.avatar:hover{box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.dropdown{display:none;position:absolute;right:0;top:40px;background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:180px;z-index:100;box-shadow:0 10px 25px rgba(0,0,0,.08);overflow:hidden}
.dropdown.show{display:block}
.dropdown a,.dropdown button{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;color:var(--text);text-decoration:none;background:none;border:none;width:100%;text-align:left;cursor:pointer}
.dropdown a:hover,.dropdown button:hover{background:#f1f5f9}
.dropdown .divider{border-top:1px solid var(--border);margin:4px 0}
.chat{flex:1;overflow-y:auto;padding:20px;max-width:720px;margin:0 auto;width:100%}
.welcome{text-align:center;padding:60px 20px 40px}
.welcome h2{font-size:22px;font-weight:700;margin-bottom:8px}
.welcome p{color:var(--sub);font-size:14px;margin-bottom:24px}
.quick-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.quick-action{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;color:var(--text);cursor:pointer;transition:all .15s}
.quick-action:hover{border-color:var(--brand);color:var(--brand);background:#eff6ff}
.msg{display:flex;gap:12px;margin-bottom:20px;animation:in .2s ease}
.msg.user{flex-direction:row-reverse}
.msg .avatar-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.msg.user .avatar-icon{background:var(--brand);color:#fff}
.msg.bot .avatar-icon{background:#f1f5f9;color:var(--brand)}
.msg .bubble{max-width:85%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.6}
.msg.user .bubble{background:#eff6ff;border-bottom-right-radius:6px}
.msg.bot .bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:6px}
.msg.bot .bubble p{margin:6px 0}.msg.bot .bubble strong{color:var(--brand)}
.msg.bot .bubble code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:12px;color:#e11d48}
.msg .time{font-size:11px;color:var(--sub);margin-top:4px;padding:0 4px}
.input-area{background:var(--surface);border-top:1px solid var(--border);padding:16px 20px;flex-shrink:0}
.input-box{max-width:720px;margin:0 auto;display:flex;gap:10px;align-items:center}
.input-box textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;font-family:inherit;outline:none;resize:none;min-height:44px;max-height:120px;transition:border-color .2s;line-height:1.5}
.input-box textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.input-box button{background:var(--brand);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;transition:background .2s;white-space:nowrap}
.input-box button:hover{background:var(--brand-hover)}
.input-box button:disabled{opacity:.4;cursor:default}
.input-hint{text-align:center;font-size:11px;color:var(--sub);margin-top:8px}
.input-hint span{color:var(--brand);cursor:pointer;margin:0 4px}
.input-hint span:hover{text-decoration:underline}
.empty-sidebar{text-align:center;padding:40px 16px;color:var(--sub);font-size:12px}
@keyframes in{from{opacity:0;transform:translateY(8px)}}
@media(max-width:768px){.sidebar{position:fixed;left:0;top:0;bottom:0;z-index:20;box-shadow:4px 0 12px rgba(0,0,0,.08)}.sidebar.collapsed{margin-left:calc(var(--sidebar-w) * -1)}}
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a href="/" class="brand">🧠 AI 知识系统</a>
  </div>
  <button class="new-chat" onclick="newChat()">＋ 新对话</button>
  <div class="conv-list" id="convList">
    <div class="empty-sidebar">暂无历史对话</div>
  </div>
</div>
<div class="main">
<div class="topbar">
  <div class="left">
    <button class="menu-btn" onclick="toggleSidebar()" title="切换侧边栏">☰</button>
    <span style="font-weight:600;font-size:14px" id="convTitle">新对话</span>
  </div>
  <div class="avatar-menu" id="avatarMenu">
    <div class="avatar" onclick="toggleMenu()">J</div>
    <div class="dropdown" id="dropdown">
      <a href="/">🏠 首页</a>
      <a href="/admin">📊 管理后台</a>
      <div class="divider"></div>
      <button onclick="deleteConv()">🗑 删除当前对话</button>
    </div>
  </div>
</div>

<div class="chat" id="chat">
  <div class="welcome" id="welcome">
    <h2>有什么可以帮你的？</h2>
    <p>知识查询、待办管理、定时提醒、笔记记录</p>
    <div class="quick-actions">
      <div class="quick-action" onclick="sendHint('待办列表')">📋 查看待办</div>
      <div class="quick-action" onclick="sendHint('? AI Workflow 是什么')">🔍 知识查询</div>
      <div class="quick-action" onclick="sendHint('今天要做什么')">📅 今日日程</div>
      <div class="quick-action" onclick="sendHint('待办 喝水 下午3点')">✅ 创建待办</div>
      <div class="quick-action" onclick="sendHint('提醒 明天9点 开会')">⏰ 设置提醒</div>
      <div class="quick-action" onclick="sendHint('早报')">📋 今日早报</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-box">
    <textarea id="input" placeholder="输入消息，Enter 发送" rows="1" onkeydown="onKey(event)" autofocus></textarea>
    <button onclick="send()" id="sendBtn">发送</button>
  </div>
  <div class="input-hint">
    <span onclick="sendHint('待办 内容')">待办</span> · <span onclick="sendHint('提醒 时间 内容')">提醒</span> · <span onclick="sendHint('笔记 内容')">笔记</span> · <span onclick="sendHint('打卡 习惯')">打卡</span>
  </div>
</div>
</div>

<script>
let convs=[],activeConv=null,welcomeShown=true;

async function loadConvs(){
  try{const r=await fetch('/chat/convs');convs=await r.json()}catch(e){convs=[]}
  renderConvs();
}

function renderConvs(){
  const el=document.getElementById('convList');
  if(!convs.length){el.innerHTML='<div class="empty-sidebar">暂无历史对话</div>';return}
  el.innerHTML=convs.map(c=>`<div class="conv-item${activeConv&&activeConv.id===c.id?' active':''}" onclick="loadConv('${c.id}')"><div class="title">${c.title||'新对话'}</div><div class="time">${c.updated_at?.slice(0,10)||''}</div></div>`).join('');
}

async function loadConv(id){
  welcomeShown=false;
  try{const r=await fetch('/chat/convs/'+id);const c=await r.json();
    activeConv={id:c.id,title:c.title,messages:c.messages};
    document.getElementById('convTitle').textContent=c.title||'对话';
    document.getElementById('chat').innerHTML=c.messages.map(m=>`<div class="msg ${m.role}"><div class="avatar-icon">${m.role==='user'?'J':'🤖'}</div><div><div class="bubble">${m.text.replace(/\n/g,'<br>')}</div><div class="time">${(m.time||'').slice(11,16)||''}</div></div></div>`).join('');
    document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
    renderConvs();
  }catch(e){}
}

async function saveConv(){
  if(!activeConv||!activeConv.messages.length)return;
  try{await fetch('/chat/convs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(activeConv)})}catch(e){}
  loadConvs();
}

async function deleteConv(){
  if(!activeConv||!activeConv.id)return;
  if(!confirm('删除当前对话？'))return;
  try{await fetch('/chat/convs/'+activeConv.id,{method:'DELETE'})}catch(e){}
  activeConv=null;loadConvs();newChatUI();
}

function newChatUI(){
  welcomeShown=true;
  document.getElementById('chat').innerHTML=`<div class="welcome" id="welcome"><h2>有什么可以帮你的？</h2><p>知识查询、待办管理、定时提醒、笔记记录</p><div class="quick-actions">${document.querySelector('.quick-actions')?document.querySelector('.quick-actions').innerHTML:''}</div></div>`;
  document.getElementById('convTitle').textContent='新对话';
}

function newChat(){activeConv=null;newChatUI();renderConvs()}

function addMsg(role,text){
  if(welcomeShown){document.getElementById('chat').innerHTML='';welcomeShown=false}
  if(!activeConv){activeConv={id:null,title:'',messages:[]}}
  const time=new Date().toLocaleTimeString();
  activeConv.messages.push({role,text,time});
  if(!activeConv.title&&role==='user'){activeConv.title=text.slice(0,30)||'新对话'}
  document.getElementById('convTitle').textContent=activeConv.title||'对话';

  const div=document.createElement('div');div.className='msg '+role;
  const icon=role==='user'?'J':'🤖';
  div.innerHTML=`<div class="avatar-icon">${icon}</div><div><div class="bubble">${text.replace(/\n/g,'<br>')}</div><div class="time">${time}</div></div></div>`;
  const chat=document.getElementById('chat');chat.appendChild(div);chat.scrollTop=chat.scrollHeight
}

async function send(){
  const input=document.getElementById('input');const text=input.value.trim();if(!text)return;
  input.value='';input.style.height='auto';input.disabled=true;document.getElementById('sendBtn').disabled=true;
  addMsg('user',text);
  try{
    const resp=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    const data=await resp.json();addMsg('bot',data.reply||'处理完成')
  }catch(e){addMsg('bot','网络错误，请重试')}
  saveConv();
  input.disabled=false;document.getElementById('sendBtn').disabled=false;input.focus()
}

function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}autoResize(e.target)}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function sendHint(t){document.getElementById('input').value=t;send()}
function toggleMenu(){document.getElementById('dropdown').classList.toggle('show')}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed')}
document.addEventListener('click',e=>{if(!document.getElementById('avatarMenu').contains(e.target))document.getElementById('dropdown').classList.remove('show')});
loadConvs();
</script>
</body>
</html>
