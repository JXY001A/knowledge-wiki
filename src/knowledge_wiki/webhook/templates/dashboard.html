<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理后台 — AI 自进化知识系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--sub:#64748b;--brand:#3b82f6}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar .brand{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.topbar .brand a{color:var(--text);text-decoration:none}
.topbar .brand a:hover{color:var(--brand)}
.topbar .time{font-size:12px;color:var(--sub)}
.tabs{display:flex;gap:2px;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{padding:6px 16px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--sub);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.tab:hover{background:var(--bg);color:var(--text)}
.tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;padding:20px 24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center}
.stat .value{font-size:28px;font-weight:700;color:var(--brand)}
.stat .label{font-size:12px;color:var(--sub);margin-top:4px}
.stat .sub{font-size:11px;color:#94a3b8;margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;padding:0 24px 24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px}
.card h3{font-size:12px;color:var(--sub);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.card canvas{max-height:220px}
.wide{grid-column:span 2}
.list{list-style:none;max-height:380px;overflow-y:auto;font-size:13px}
.list li{padding:8px 10px;border-bottom:1px solid var(--bg);display:flex;justify-content:space-between;align-items:center;border-radius:6px}
.list li:hover{background:var(--bg)}
.badge{background:var(--bg);padding:2px 10px;border-radius:12px;font-size:11px;color:var(--sub)}
.badge.green{background:#dcfce7;color:#16a34a}
.badge.yellow{background:#fef9c3;color:#a16207}
.badge.blue{background:#dbeafe;color:var(--brand)}
.dir-group{margin-bottom:16px}
.dir-name{font-size:13px;color:var(--brand);margin-bottom:6px;font-weight:600}
.dir-pages{display:flex;flex-wrap:wrap;gap:6px}
.page-chip{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--text);transition:all .1s}
.page-chip:hover{border-color:var(--brand)}
.skill-row{display:flex;align-items:center;gap:8px}
.tag{display:inline-block;background:var(--bg);color:var(--sub);padding:1px 6px;border-radius:4px;font-size:10px;margin:1px}
.log-score{font-weight:600;color:var(--brand)}
.refresh{font-size:11px;color:var(--sub);text-align:center;padding:16px}
.section{display:none}.section.active{display:block}
@media(max-width:640px){.wide{grid-column:span 1}.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><a href="/">🧠 AI 自进化知识系统</a> <span style="color:var(--sub);font-weight:400">/ 管理后台</span></div>
  <span class="time" id="clock"></span>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('overview')">📊 概览</button>
  <button class="tab" onclick="switchTab('skills')">⚡ Skills</button>
  <button class="tab" onclick="switchTab('wiki')">📚 知识库</button>
  <button class="tab" onclick="switchTab('logs')">📋 操作日志</button>
</div>

<div class="section active" id="tab-overview">
<div class="stats" id="overview"></div>
<div class="grid">
  <div class="card wide"><h3>📊 评估趋势（近 30 天）</h3><canvas id="evalChart"></canvas></div>
  <div class="card"><h3>📈 知识增长</h3><canvas id="growthChart"></canvas></div>
  <div class="card"><h3>🧠 记忆分布</h3><canvas id="memoryChart"></canvas></div>
  <div class="card"><h3>✅ 待办概览</h3><canvas id="todoChart"></canvas></div>
  <div class="card"><h3>🔍 知识缺口</h3><ul class="list" id="gaps"></ul></div>
  <div class="card"><h3>⏰ 活跃提醒</h3><ul class="list" id="reminders"></ul></div>
</div>
</div>

<div class="section" id="tab-skills">
<div class="stats" id="skillStats"></div>
<div class="grid">
  <div class="card"><h3>全部 Skills</h3><ul class="list" id="skillList"></ul></div>
  <div class="card"><h3>📋 最近待办</h3><ul class="list" id="recentTodos"></ul></div>
</div>
</div>

<div class="section" id="tab-wiki">
<div class="stats" id="wikiStats"></div>
<div class="grid"><div class="card"><h3>📚 知识库目录</h3><div id="wikiDirs"></div></div></div>
</div>

<div class="section" id="tab-logs">
<div class="grid"><div class="card wide"><h3>📋 操作日志（最近 50 条）</h3><ul class="list" id="queryLog"></ul></div></div>
</div>

<div class="refresh">每 60 秒自动刷新 · <span id="lastUpdate"></span></div>

<script>
const colors=['#3b82f6','#16a34a','#eab308','#ef4444','#8b5cf6','#f97316','#06b6d4','#ec4899'];
let charts={},data={};

async function load(){
  const resp=await fetch('/admin/data'); data=await resp.json();
  renderOverview(); renderSkills(); renderWiki(); renderLogs();
  document.getElementById('lastUpdate').textContent='最后更新 '+new Date().toLocaleTimeString();
}

function renderOverview(){
  const ov=data.overview;
  const done=ov.todos_total-ov.todos_pending;
  document.getElementById('overview').innerHTML=
    `<div class="stat"><div class="value">${ov.wiki_pages}</div><div class="label">Wiki 页面</div><div class="sub">${ov.concepts} 个概念页</div></div>`+
    `<div class="stat"><div class="value">⭐ ${ov.eval_avg}</div><div class="label">回答均分</div><div class="sub">共 ${ov.eval_count} 次评估</div></div>`+
    `<div class="stat"><div class="value">${ov.memories}</div><div class="label">操作记忆</div><div class="sub">条记录</div></div>`+
    `<div class="stat"><div class="value">${done}/${ov.todos_total}</div><div class="label">待办完成</div><div class="sub">剩余 ${ov.todos_pending} 项</div></div>`;

  chart('evalChart','line',{
    labels:data.eval_trend.map(r=>r.date.slice(5)),
    datasets:[{label:'均分',data:data.eval_trend.map(r=>r.avg),borderColor:'#3b82f6',tension:.3,fill:false},
              {label:'次数',data:data.eval_trend.map(r=>r.count),borderColor:'#16a34a',tension:.3,fill:false,yAxisID:'y1'}]
  },{scales:{y:{min:0,max:5,ticks:{stepSize:1}},y1:{position:'right',grid:{display:false},min:0}}});

  chart('growthChart','line',{
    labels:data.wiki_growth.map(r=>r.date.slice(5)),
    datasets:[{label:'页面数',data:data.wiki_growth.map(r=>r.pages),borderColor:'#16a34a',fill:true,backgroundColor:'rgba(22,163,74,0.08)',tension:.3,pointRadius:2}]
  });

  const mem=data.memory_dist;
  chart('memoryChart','doughnut',{labels:mem.labels,datasets:[{data:mem.counts,backgroundColor:colors}]});
  const td=data.todos;
  chart('todoChart','doughnut',{labels:['未完成','已完成','已取消'],datasets:[{data:[td.pending,td.done,td.cancelled],backgroundColor:['#eab308','#16a34a','#94a3b8']}]});

  document.getElementById('gaps').innerHTML=data.gaps.map(g=>`<li><span>${g.topic}</span><span class="badge">${g.count}次</span></li>`).join('')||'<li style="color:var(--sub)">暂无缺口数据</li>';
  document.getElementById('reminders').innerHTML=data.reminders.map(r=>`<li><span>${r.content}</span><span style="color:var(--brand);font-family:monospace;font-size:12px">${r.trigger||''}</span></li>`).join('')||'<li style="color:var(--sub)">暂无活跃提醒</li>';
}

function renderSkills(){
  const skills=data.skills||[];
  document.getElementById('skillStats').innerHTML=
    `<div class="stat"><div class="value">${skills.length}</div><div class="label">总 Skills</div></div>`+
    `<div class="stat"><div class="value">${skills.reduce((a,s)=>a+(s.count||0),0)}</div><div class="label">总执行次数</div></div>`+
    `<div class="stat"><div class="value">${skills.filter(s=>s.tier===1).length}</div><div class="label">核心 (T1)</div></div>`;

  document.getElementById('skillList').innerHTML=skills.map(s=>
    `<li><div class="skill-row"><span>${s.name}</span><span class="badge blue">T${s.tier}</span><span class="badge">${s.model}</span></div><span class="badge green">${s.count||0}次</span></li>`
  ).join('');

  const td=data.todos;
  document.getElementById('recentTodos').innerHTML=td.recent.map(t=>
    `<li><span style="color:${t.status==='done'?'#16a34a':t.status==='cancelled'?'#94a3b8':'#eab308'}">${t.status==='done'?'✅':'⏳'} ${t.title}</span><span style="font-size:11px;color:var(--sub)">${t.created||''}${t.deadline?' · ⏰'+t.deadline:''}</span></li>`
  ).join('')||'<li style="color:var(--sub)">暂无待办</li>';
}

function renderWiki(){
  const pages=data.wiki_pages||[];
  const total=pages.reduce((a,d)=>a+d.count,0);
  document.getElementById('wikiStats').innerHTML=
    `<div class="stat"><div class="value">${total}</div><div class="label">总页面</div></div>`+
    `<div class="stat"><div class="value">${pages.length}</div><div class="label">目录数</div></div>`;

  document.getElementById('wikiDirs').innerHTML=pages.map(d=>
    `<div class="dir-group"><div class="dir-name">📁 ${d.directory} (${d.count})</div><div class="dir-pages">${d.pages.map(p=>`<span class="page-chip" title="${(p.tags||[]).join(', ')}">${p.title}</span>`).join('')}</div></div>`
  ).join('');
}

function renderLogs(){
  const logs=data.query_log||[];
  document.getElementById('queryLog').innerHTML=logs.map(l=>
    `<li><span>${l.icon} ${l.summary}</span><span>${l.score?`<span class="log-score">⭐${l.score}</span> `:''}<span style="color:var(--sub);font-size:11px">${l.created}</span></span></li>`
  ).join('')||'<li style="color:var(--sub)">暂无操作记录</li>';
}

function chart(id,type,config,extra={}){
  if(charts[id])charts[id].destroy();
  charts[id]=new Chart(document.getElementById(id),{type,data:config,options:{...extra,responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#64748b',font:{size:11}}}}}});
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${{overview:1,skills:2,wiki:3,logs:4}[name]})`).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function clock(){document.getElementById('clock').textContent=new Date().toLocaleString('zh-CN');}
load();clock();setInterval(load,60000);setInterval(clock,1000);
</script>
</body>
</html>
