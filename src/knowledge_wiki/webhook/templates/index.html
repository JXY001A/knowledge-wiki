<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 自进化知识系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--sub:#64748b;--brand:#3b82f6;--brand-hover:#2563eb;--user-bg:#eff6ff;--bot-bg:#fff;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar .brand{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.topbar .brand .dot{width:8px;height:8px;border-radius:50%;background:#4ade80}
.avatar-menu{position:relative}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;transition:box-shadow .2s}
.avatar:hover{box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.dropdown{display:none;position:absolute;right:0;top:40px;background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:180px;z-index:100;box-shadow:0 10px 25px rgba(0,0,0,.08);overflow:hidden}
.dropdown.show{display:block}
.dropdown a,.dropdown button{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;color:var(--text);text-decoration:none;background:none;border:none;width:100%;text-align:left;cursor:pointer}
.dropdown a:hover,.dropdown button:hover{background:#f1f5f9}
.dropdown .divider{border-top:1px solid var(--border);margin:4px 0}
.chat{flex:1;overflow-y:auto;padding:20px;max-width:720px;margin:0 auto;width:100%}
.welcome{text-align:center;padding:60px 20px 40px}
.welcome h2{font-size:22px;font-weight:700;margin-bottom:8px}
.welcome p{color:var(--sub);font-size:14px;margin-bottom:24px}
.quick-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.quick-action{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;color:var(--text);cursor:pointer;transition:all .15s}
.quick-action:hover{border-color:var(--brand);color:var(--brand);background:#eff6ff}
.msg{display:flex;gap:12px;margin-bottom:20px;animation:in .25s ease}
.msg.user{flex-direction:row-reverse}
.msg .avatar-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.user .avatar-icon{background:var(--brand);color:#fff}
.msg.bot .avatar-icon{background:#f1f5f9;color:var(--brand)}
.msg .bubble{max-width:85%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.6;color:var(--text)}
.msg.user .bubble{background:var(--user-bg);border-bottom-right-radius:6px}
.msg.bot .bubble{background:var(--bot-bg);border:1px solid var(--border);border-bottom-left-radius:6px}
.msg.bot .bubble p{margin:6px 0}
.msg.bot .bubble strong{color:var(--brand)}
.msg.bot .bubble code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:12px;color:#e11d48}
.msg .time{font-size:11px;color:var(--sub);margin-top:4px;padding:0 4px}
.input-area{background:var(--surface);border-top:1px solid var(--border);padding:16px 20px;flex-shrink:0}
.input-box{max-width:720px;margin:0 auto;display:flex;gap:10px;align-items:center}
.input-box textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;font-family:inherit;outline:none;resize:none;min-height:44px;max-height:120px;transition:border-color .2s;line-height:1.5}
.input-box textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.input-box button{background:var(--brand);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;transition:background .2s;white-space:nowrap}
.input-box button:hover{background:var(--brand-hover)}
.input-box button:disabled{opacity:.4;cursor:default}
.input-hint{text-align:center;font-size:11px;color:var(--sub);margin-top:8px}
.input-hint span{color:var(--brand);cursor:pointer;margin:0 4px}
.input-hint span:hover{text-decoration:underline}
.empty-state{text-align:center;padding:80px 20px;color:var(--sub)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:13px}
@keyframes in{from{opacity:0;transform:translateY(8px)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="dot"></span> AI 自进化知识系统</div>
  <div class="avatar-menu" id="avatarMenu">
    <div class="avatar" onclick="toggleMenu()">J</div>
    <div class="dropdown" id="dropdown">
      <a href="/admin">📊 管理后台</a>
      <div class="divider"></div>
      <button onclick="clearChat()">🗑 清空对话</button>
    </div>
  </div>
</div>

<div class="chat" id="chat">
  <div class="welcome">
    <h2>有什么可以帮你的？</h2>
    <p>知识查询、待办管理、定时提醒、笔记记录 — 都在这里</p>
    <div class="quick-actions">
      <div class="quick-action" onclick="sendHint('待办列表')">📋 待办列表</div>
      <div class="quick-action" onclick="sendHint('? 什么是 MCP 协议')">🔍 知识查询</div>
      <div class="quick-action" onclick="sendHint('今天要做什么')">📅 查看日程</div>
      <div class="quick-action" onclick="sendHint('待办 喝水 下午3点')">✅ 创建待办</div>
      <div class="quick-action" onclick="sendHint('提醒 明天9点 开会')">⏰ 设置提醒</div>
      <div class="quick-action" onclick="sendHint('笔记 今天完成了部署')">📝 快速笔记</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-box">
    <textarea id="input" placeholder="输入消息，Enter 发送，Shift+Enter 换行" rows="1" onkeydown="onKey(event)" autofocus></textarea>
    <button onclick="send()" id="sendBtn">发送</button>
  </div>
  <div class="input-hint">
    试试: <span onclick="sendHint('待办列表')">待办列表</span> ·
    <span onclick="sendHint('? 知识查询')">知识查询</span> ·
    <span onclick="sendHint('早报')">早报</span>
  </div>
</div>

<script>
let welcomeShown=true,history=[];

function toggleMenu(){
  document.getElementById('dropdown').classList.toggle('show');
}
document.addEventListener('click',e=>{
  if(!document.getElementById('avatarMenu').contains(e.target))
    document.getElementById('dropdown').classList.remove('show');
});

function onKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
  autoResize(e.target);
}
function autoResize(el){
  el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px';
}

function addMsg(role,text){
  if(welcomeShown){document.getElementById('chat').innerHTML='';welcomeShown=false;}
  const div=document.createElement('div');
  div.className='msg '+role;
  const icon=role==='user'?'J':'🤖';
  div.innerHTML=`<div class="avatar-icon">${icon}</div><div><div class="bubble">${text.replace(/\n/g,'<br>')}</div><div class="time">${new Date().toLocaleTimeString()}</div></div>`;
  const chat=document.getElementById('chat');
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

async function send(){
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text)return;
  input.value=''; input.style.height='auto';
  input.disabled=true; document.getElementById('sendBtn').disabled=true;
  addMsg('user',text);

  try{
    const resp=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,history})});
    const data=await resp.json();
    addMsg('bot',data.reply||'处理完成');
    history=data.history||history;
  }catch(e){
    addMsg('bot','网络错误，请重试');
  }
  input.disabled=false; document.getElementById('sendBtn').disabled=false; input.focus();
}

function sendHint(t){document.getElementById('input').value=t;send();}
function clearChat(){document.getElementById('chat').innerHTML='';welcomeShown=true;history=[];location.reload();}
</script>
</body>
</html>
