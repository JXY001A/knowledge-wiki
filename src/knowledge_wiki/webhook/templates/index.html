<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 自进化知识系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.topbar{background:#1e293b;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #334155}
.topbar .brand{font-size:16px;color:#38bdf8;font-weight:600}
.avatar-menu{position:relative;cursor:pointer}
.avatar{width:36px;height:36px;border-radius:50%;background:#38bdf8;display:flex;align-items:center;justify-content:center;font-size:14px;color:#0f172a;font-weight:700}
.dropdown{display:none;position:absolute;right:0;top:44px;background:#1e293b;border:1px solid #334155;border-radius:8px;min-width:160px;z-index:100;overflow:hidden}
.dropdown.show{display:block}
.dropdown a,.dropdown button{display:block;padding:10px 16px;font-size:13px;color:#e2e8f0;text-decoration:none;background:none;border:none;width:100%;text-align:left;cursor:pointer}
.dropdown a:hover,.dropdown button:hover{background:#334155}
.dropdown .divider{border-top:1px solid #334155;margin:4px 0}
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;max-width:800px;margin:0 auto;width:100%}
.msg{display:flex;gap:8px;animation:in .2s ease}
.msg.user{flex-direction:row-reverse}
.msg .bubble{max-width:75%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-break:break-word}
.msg.user .bubble{background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.msg.bot .bubble{background:#1e293b;border:1px solid #334155;border-bottom-left-radius:4px}
.msg.bot .bubble p{margin:4px 0}
.msg.bot .bubble code{background:#0f172a;padding:2px 6px;border-radius:4px;font-size:12px}
.msg.bot .bubble strong{color:#38bdf8}
.msg .avatar-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.msg.user .avatar-icon{background:#2563eb}
.msg.bot .avatar-icon{background:#1e293b;border:1px solid #334155}
.msg .time{font-size:10px;color:#64748b;margin-top:4px}
.input-bar{background:#1e293b;padding:12px 16px;border-top:1px solid #334155;display:flex;gap:8px;align-items:center;max-width:800px;margin:0 auto;width:100%}
.input-bar input{flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:14px;outline:none}
.input-bar input:focus{border-color:#38bdf8}
.input-bar button{background:#38bdf8;color:#0f172a;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer}
.input-bar button:hover{background:#7dd3fc}
.input-bar button:disabled{opacity:.5}
.hints{font-size:11px;color:#64748b;padding:4px 16px;text-align:center}
.hints span{color:#38bdf8;cursor:pointer}
.typing .bubble::after{content:'●';animation:blink 1s infinite}
@keyframes blink{50%{opacity:0}}@keyframes in{from{opacity:0;transform:translateY(8px)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">🧠 AI 自进化知识系统</div>
  <div class="avatar-menu" id="avatarMenu">
    <div class="avatar" onclick="toggleMenu()">J</div>
    <div class="dropdown" id="dropdown">
      <a href="/admin">📊 管理后台</a>
      <div class="divider"></div>
      <button onclick="clearChat()">🗑 清空对话</button>
      <button onclick="showHelp()">❓ 使用帮助</button>
    </div>
  </div>
</div>

<div class="chat" id="chat">
  <div class="msg bot">
    <div class="avatar-icon">🤖</div>
    <div>
      <div class="bubble">你好！我是 AI 知识助手。<br><br>可以问我任何问题，或者：<br>• <strong>待办 喝水 下午3点</strong> — 创建待办<br>• <strong>提醒 明天9点 开会</strong> — 设置提醒<br>• <strong>笔记 xxx</strong> — 保存笔记<br>• <strong>? 什么是 MCP</strong> — 知识查询<br>• <strong>待办列表</strong> — 查看待办</div>
    </div>
  </div>
</div>

<div class="hints">试试: <span onclick="sendHint('待办列表')">待办列表</span> · <span onclick="sendHint('? AI Workflow 是什么')">? 知识查询</span> · <span onclick="sendHint('今天要做什么')">查看日程</span></div>

<div class="input-bar">
  <input id="input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')send()" autofocus>
  <button onclick="send()" id="sendBtn">发送</button>
</div>

<script>
let history=[];

function toggleMenu(){
  document.getElementById('dropdown').classList.toggle('show');
}
document.addEventListener('click',e=>{
  if(!document.getElementById('avatarMenu').contains(e.target))
    document.getElementById('dropdown').classList.remove('show');
});

function addMsg(role,text){
  const div=document.createElement('div');
  div.className='msg '+role;
  const icon=role==='user'?'👤':'🤖';
  div.innerHTML=`<div class="avatar-icon">${icon}</div><div><div class="bubble">${text.replace(/\n/g,'<br>')}</div><div class="time">${new Date().toLocaleTimeString()}</div></div>`;
  document.getElementById('chat').appendChild(div);
  document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
}

async function send(){
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text)return;
  input.value=''; input.disabled=true; document.getElementById('sendBtn').disabled=true;
  addMsg('user',text);

  try{
    const resp=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,history})});
    const data=await resp.json();
    addMsg('bot',data.reply||'处理完成');
    history=data.history||history;
  }catch(e){
    addMsg('bot','抱歉，处理出错: '+e.message);
  }
  input.disabled=false; document.getElementById('sendBtn').disabled=false; input.focus();
}

function sendHint(t){document.getElementById('input').value=t;send();}
function clearChat(){document.getElementById('chat').innerHTML='';history=[];}
function showHelp(){addMsg('bot','<strong>命令列表</strong><br>• 待办 内容 — 创建待办<br>• 待办列表 — 查看待办<br>• 完成 待办名 — 标记完成<br>• 提醒 时间 内容 — 设置提醒<br>• 笔记 内容 — 保存笔记<br>• 打卡 习惯名 — 习惯打卡<br>• ? 问题 — 知识查询<br>• 今天要做什么 — 查看日程<br>• 早报/晚报 — 查看简报<br>• 自动摄取 — 搜索知识缺口');}
</script>
</body>
</html>
